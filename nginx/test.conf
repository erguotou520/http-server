server {
    listen 7778;
    server_name localhost;
    charset utf-8;

    # https://github.com/darktable/html5-boilerplate-server-configs/blob/master/nginx.conf
    # Enable Gzip
    gzip  on;
    gzip_http_version 1.0;
    gzip_comp_level 2;
    gzip_min_length 1100;
    gzip_buffers     4 8k;
    gzip_proxied any;
    gzip_types
      # text/html is always compressed by HttpGzipModule
      text/css
      text/javascript
      text/xml
      text/plain
      text/x-component
      application/javascript
      application/json
      application/xml
      application/rss+xml
      font/truetype
      font/opentype
      application/vnd.ms-fontobject
      image/svg+xml;

    gzip_static on;

    gzip_proxied        expired no-cache no-store private auth;
    gzip_disable        "MSIE [1-6]\.";
    gzip_vary           on;

    # brotli on;
    # brotli_comp_level 2;
    # brotli_types text/plain text/css application/javascript application/json image/svg+xml application/xml+rss;
    # brotli_static on;

    location /jeecg-boot/act/designer {
      proxy_pass       http://192.168.201.139:8081;
      proxy_buffer_size 4k;
      proxy_buffering on;
      proxy_buffers 4 4k;
      proxy_busy_buffers_size 8k;
      proxy_read_timeout 3600s;
      proxy_max_temp_file_size 0;
      proxy_set_header X_GATEWAY_BASE_PATH https://oa.njgxq.org.cn/jeecg-boot;
      client_max_body_size 1000m;
      client_body_buffer_size 360k;
    }
}